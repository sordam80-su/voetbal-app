
<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a7a3c;--green-dark:#0f5028;--green-light:#e8f5ed;
  --gold:#d4a017;--red:#c0392b;--navy:#1a2744;
  --bg:#f0f4f1;--card:#fff;--border:#d1e0d6;
  --text:#1a2e22;--muted:#5a7a65;--radius:12px
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;margin:0}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-logo{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-title{flex:1}
.header-title h1{font-size:15px;font-weight:600;margin:0}
.header-title p{font-size:11px;opacity:.75;margin:0}
.btn-header{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.btn-header:hover{background:rgba(255,255,255,.25)}
.nav{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;display:flex;padding:0 8px}
.nav-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;font-weight:500;transition:.15s}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.nav-btn:hover:not(.active){color:var(--text);background:var(--bg)}
.content{flex:1;padding:16px;max-width:700px;margin:0 auto;width:100%}
.page-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:#fff0ee;color:var(--red);border:1px solid #fcc}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-live{background:#ffe4e4;color:var(--red);animation:pulse 1.5s infinite}
.badge-paused{background:#fff8e0;color:#8a6800}
.badge-scheduled{background:var(--green-light);color:var(--green-dark)}
.badge-finished{background:#f0f0f0;color:#555}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:#fff;outline:none;font-family:inherit;transition:.15s}
.field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,122,60,.1)}
select.field{cursor:pointer}
textarea.field{min-height:72px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
.score-board{background:linear-gradient(135deg,var(--navy),#2a3a5c);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:12px}
.score-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:12px;text-align:center}
.score-num{font-size:52px;font-weight:800;line-height:1}
.score-label{font-size:12px;opacity:.75;margin-bottom:4px}
.score-clock{font-size:26px;font-family:monospace;font-weight:700;letter-spacing:2px}
.score-period{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.progress-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--gold);transition:width .5s}
.tab-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500}
.tab-pill.active{background:var(--green);color:#fff;border-color:var(--green)}
.tab-pill:hover:not(.active){background:var(--green-light);color:var(--green-dark);border-color:var(--green)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:12px 0 8px}
.event-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg);margin-bottom:6px}
.event-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.event-detail{flex:1;min-width:0}
.event-title{font-size:13px;font-weight:500}
.event-sub{font-size:11px;color:var(--muted);margin-top:1px}
.event-del{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 5px;border-radius:4px;font-size:16px}
.event-del:hover{color:var(--red);background:#fee}
.ctrl-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.ctrl-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:var(--text)}
.ctrl-btn:hover{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.ctrl-btn.primary{background:var(--green);color:#fff;border-color:var(--green-dark)}
.ctrl-btn.primary:hover{background:var(--green-dark)}
.ctrl-btn.danger{background:#fff0ee;color:var(--red);border-color:#fcc}
.ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.ev-btn{padding:10px 6px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:11px;font-weight:500;text-align:center;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:2px}
.ev-btn:hover{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.ev-btn .ev-ico{font-size:18px}
.player-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:6px}
.player-num{width:32px;height:32px;border-radius:50%;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pos-tag{display:inline-flex;padding:2px 6px;border-radius:4px;background:var(--green-light);color:var(--green-dark);font-size:10px;font-weight:600;margin:1px}
.team-card{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;margin-bottom:8px}
.team-logo{width:44px;height:44px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.match-card{border:1px solid var(--border);border-radius:var(--radius);background:#fff;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.match-card:hover{border-color:var(--green);box-shadow:0 2px 8px rgba(26,122,60,.1)}
.match-title{font-weight:600;font-size:14px;color:var(--navy);margin:6px 0 4px}
.score-large{font-size:30px;font-weight:800;color:var(--navy)}
.stat-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{flex:1;font-size:13px;color:var(--muted)}
.stat-val{font-size:13px;font-weight:600}
.tag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:11px;font-weight:500;display:inline-flex}
.tag.active{background:var(--green);color:#fff;border-color:var(--green)}
.toast{position:fixed;top:14px;right:14px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeIn .2s}
.toast.success{background:var(--green-dark)}
.toast.error{background:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;justify-content:center}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#d4ead9,#b8d9c3)}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
.login-title{text-align:center;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px}
.mode-switch{display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px}
.mode-btn{flex:1;padding:9px;border:none;background:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:.15s}
.mode-btn.active{background:#fff;color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.login-submit{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.login-submit:hover{background:var(--green-dark)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  page: 'login',       // 'login' | 'dash' | 'match'
  user: null,
  loginMode: 'signin',
  tab: 'dashboard',
  currentMatchId: null,
  showModal: null,     // 'new-match'
  showAddEvent: null,
  statsFilter: 'all',
  statsTeamId: 't1',
  teamTab: 't1',
  timerNow: Date.now(),

  teams: [
    {id:'t1',name:'Excelsior Maassluis',logo:'⚽',is_fixed:true,player_format:11,match_duration_minutes:90,period_count:2}
  ],
  players: [
    {id:'p1',team_id:'t1',name:'Lars de Vries',shirt_number:1,position:'K'},
    {id:'p2',team_id:'t1',name:'Daan Smit',shirt_number:4,position:'VC,VL'},
    {id:'p3',team_id:'t1',name:'Ruben Bakker',shirt_number:5,position:'VC'},
    {id:'p4',team_id:'t1',name:'Thomas Jansen',shirt_number:7,position:'MR,MC'},
    {id:'p5',team_id:'t1',name:'Niek van den Berg',shirt_number:9,position:'SP'},
    {id:'p6',team_id:'t1',name:'Milan Peters',shirt_number:10,position:'MC,AC'},
    {id:'p7',team_id:'t1',name:'Sven Visser',shirt_number:11,position:'AVL'},
  ],
  tournaments: [
    {id:'tn1',name:'Zomer Cup 2026',start_date:'2026-07-15',format:'group',location:'Maassluis'}
  ],
  matches: [
    {id:'m1',team_id:'t1',team_name:'Excelsior Maassluis',opponent:'FC Rotterdam U15',home_away:'home',status:'live',home_score:2,away_score:1,match_date:'2026-06-17T14:00',match_type:'league',timer_elapsed_ms:1260000,timer_started_at: new Date(Date.now()-180000).toISOString(),share_token:'tok1',quarter_minutes:45,total_quarters:2,current_quarter:1,is_break:false,period_durations_ms:[],tournament_id:null,show_lineup_public:true,player_format:11},
    {id:'m2',team_id:'t1',team_name:'Excelsior Maassluis',opponent:'Spartaan 20',home_away:'away',status:'scheduled',home_score:0,away_score:0,match_date:'2026-06-21T10:00',match_type:'league',timer_elapsed_ms:0,timer_started_at:null,share_token:'tok2',quarter_minutes:45,total_quarters:2,current_quarter:1,is_break:false,period_durations_ms:[],tournament_id:null,show_lineup_public:true,player_format:11},
    {id:'m3',team_id:'t1',team_name:'Excelsior Maassluis',opponent:'SV Maassluis',home_away:'home',status:'finished',home_score:3,away_score:0,match_date:'2026-06-10T14:00',match_type:'friendly',timer_elapsed_ms:5400000,timer_started_at:null,share_token:'tok3',quarter_minutes:45,total_quarters:2,current_quarter:2,is_break:false,period_durations_ms:[2700000,2700000],tournament_id:null,show_lineup_public:true,player_format:11},
  ],
  events: [
    {id:'e1',match_id:'m1',type:'goal',team_side:'home',quarter:1,clock_ms:780000,player_name:'Niek van den Berg',note:null,player_out:null,player_in:null},
    {id:'e2',match_id:'m1',type:'goal',team_side:'home',quarter:1,clock_ms:1020000,player_name:'Milan Peters',note:null,player_out:null,player_in:null},
    {id:'e3',match_id:'m1',type:'goal',team_side:'away',quarter:1,clock_ms:1140000,player_name:null,note:null,player_out:null,player_in:null},
    {id:'e4',match_id:'m3',type:'goal',team_side:'home',quarter:1,clock_ms:840000,player_name:'Sven Visser',note:null,player_out:null,player_in:null},
    {id:'e5',match_id:'m3',type:'goal',team_side:'home',quarter:1,clock_ms:1560000,player_name:'Niek van den Berg',note:null,player_out:null,player_in:null},
    {id:'e6',match_id:'m3',type:'goal',team_side:'home',quarter:2,clock_ms:2100000,player_name:'Niek van den Berg',note:null,player_out:null,player_in:null},
  ],

  // forms (mutable via input events directly)
  loginEmail:'', loginPassword:'', loginName:'',
  newMatchOpponent:'', newMatchDate:'', newMatchTeamId:'t1',
  newMatchHomeAway:'home', newMatchType:'league', newMatchTournamentId:'',
  newPlayerName:'', newPlayerShirt:'', newPlayerPositions:[],
  newTeamName:'', newTeamLogo:'', newTeamFormat:8,
  newTournamentName:'', newTournamentDate:'', newTournamentFormat:'group', newTournamentLocation:'',
  evSide:'home', evPlayer:'', evNote:'', evClockMin:0, evPlayerOutId:'', evPlayerInId:'',
};

// ── Helpers ────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type='success') {
  const d = document.getElementById('toasts');
  d.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  d.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { d.innerHTML = ''; }, 2800);
}

function uid() { return '_' + Math.random().toString(36).slice(2,9); }

const fmt = ms => {
  const s = Math.max(0, Math.floor(ms/1000));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
};
const fmtDate = d => { try { return new Date(d).toLocaleString('nl-NL',{dateStyle:'short',timeStyle:'short'}); } catch(e){return d;} };
const fmtDateOnly = d => { try { return new Date(d).toLocaleDateString('nl-NL',{dateStyle:'medium'}); } catch(e){return d;} };

function getElapsed(m) {
  if (m.status === 'live' && m.timer_started_at) {
    return m.timer_elapsed_ms + (S.timerNow - new Date(m.timer_started_at).getTime());
  }
  return m.timer_elapsed_ms;
}

const EV_ICON = {goal:'⚽',yellow_card:'🟨',red_card:'🟥',substitution:'🔄',note:'📝',corner:'🚩',free_kick:'🅵',penalty_scored:'🎯',penalty_missed:'❌'};
const EV_LABEL = {goal:'Doelpunt',yellow_card:'Gele kaart',red_card:'Rode kaart',substitution:'Wissel',note:'Notitie',corner:'Hoekschop',free_kick:'Vrije trap',penalty_scored:'Strafschop (gescoord)',penalty_missed:'Strafschop (gemist)'};
const KIND_TYPE = {goal:'goal',yellow:'yellow_card',red:'red_card',sub:'substitution',note:'note',corner:'corner',free_kick:'free_kick',pen_scored:'penalty_scored',pen_missed:'penalty_missed'};
const POSITIONS = ['K','VL','VC','VR','ML','MC','MR','AVL','AVC','AVR','SP'];

// ── Re-render ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (S.page === 'login') { renderLogin(app); return; }
  if (S.page === 'match') { renderMatch(app); return; }
  renderShell(app);
}

// ── Login ──────────────────────────────────────────────────────────────────
function renderLogin(app) {
  app.innerHTML = `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">⚽</div>
      <h1 class="login-title">Familie Voetbal App</h1>
      <p class="login-sub">Wedstrijden bijhouden, delen &amp; analyseren</p>
      <div class="mode-switch">
        <button class="mode-btn ${S.loginMode==='signin'?'active':''}" id="btn-signin">Inloggen</button>
        <button class="mode-btn ${S.loginMode==='signup'?'active':''}" id="btn-signup">Account maken</button>
      </div>
      ${S.loginMode==='signup'?`
        <div class="form-group">
          <label>Naam</label>
          <input class="field" id="login-name" type="text" placeholder="Jouw naam" value="${S.loginName||''}">
        </div>`:''}
      <div class="form-group">
        <label>E-mail</label>
        <input class="field" id="login-email" type="email" placeholder="jij@example.com" value="${S.loginEmail||''}">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input class="field" id="login-pass" type="password" placeholder="••••••••" value="${S.loginPassword||''}">
      </div>
      <button class="login-submit" id="login-submit">${S.loginMode==='signin'?'Inloggen':'Account maken'}</button>
    </div>
  </div>`;

  document.getElementById('btn-signin').onclick = () => { S.loginMode='signin'; render(); };
  document.getElementById('btn-signup').onclick = () => { S.loginMode='signup'; render(); };
  document.getElementById('login-email').oninput = e => { S.loginEmail = e.target.value; };
  document.getElementById('login-pass').oninput = e => { S.loginPassword = e.target.value; };
  const nm = document.getElementById('login-name');
  if (nm) nm.oninput = e => { S.loginName = e.target.value; };
  document.getElementById('login-submit').onclick = () => {
    if (!S.loginEmail) { toast('Vul een e-mail in','error'); return; }
    if (!S.loginPassword) { toast('Vul een wachtwoord in','error'); return; }
    S.user = {id:'u1', email:S.loginEmail, name:S.loginName||S.loginEmail};
    S.page = 'dash'; S.tab = 'dashboard';
    render();
    toast('Welkom ' + (S.loginName||S.loginEmail) + '! ⚽');
  };
}

// ── Shell ──────────────────────────────────────────────────────────────────
function renderShell(app) {
  const tabs = [['dashboard','📋 Wedstrijden'],['teams','🛡️ Teams'],['players','👤 Spelers'],['stats','📊 Stats'],['tournaments','🏆 Toernooien']];
  app.innerHTML = `
  <div class="app">
    <div class="header">
      <div class="header-logo">⚽</div>
      <div class="header-title">
        <h1>Familie Voetbal App</h1>
        <p>Live wedstrijden bijhouden &amp; delen</p>
      </div>
      <button class="btn-header" id="btn-signout">← Uitloggen</button>
    </div>
    <div class="nav" id="main-nav"></div>
    <div class="content" id="main-content"></div>
  </div>`;

  document.getElementById('btn-signout').onclick = () => { S.page='login'; S.user=null; render(); };

  const nav = document.getElementById('main-nav');
  tabs.forEach(([key,label]) => {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (S.tab===key?' active':'');
    b.textContent = label;
    b.onclick = () => { S.tab=key; render(); };
    nav.appendChild(b);
  });

  const content = document.getElementById('main-content');
  if (S.tab==='dashboard') renderDashboard(content);
  else if (S.tab==='teams') renderTeams(content);
  else if (S.tab==='players') renderPlayers(content);
  else if (S.tab==='stats') renderStats(content);
  else if (S.tab==='tournaments') renderTournaments(content);

  if (S.showModal === 'new-match') renderNewMatchModal();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(el) {
  const active = S.matches.filter(m => !m.tournament_id && ['scheduled','live','paused'].includes(m.status));
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h1 class="page-title" style="margin:0">Wedstrijden</h1>
    <button class="btn btn-primary" id="btn-new-match">+ Nieuwe wedstrijd</button>
  </div>`;
  if (!active.length) {
    html += `<div class="empty"><div class="empty-icon">🏟️</div><h3>Geen geplande wedstrijden</h3><p>Voeg een nieuwe wedstrijd toe om te beginnen.</p></div>`;
  } else {
    active.forEach(m => {
      const elapsed = getElapsed(m);
      const homeLabel = m.home_away==='home'?m.team_name:m.opponent;
      const awayLabel = m.home_away==='home'?m.opponent:m.team_name;
      html += `<div class="match-card" data-mid="${m.id}">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge badge-${m.status}">${m.status==='live'?'🔴 Live':m.status==='paused'?'⏸️ Pauze':'📅 Gepland'}</span>
          <span style="font-size:11px;color:var(--muted)">${fmtDate(m.match_date)}</span>
        </div>
        <div class="match-title">${homeLabel} — ${awayLabel}</div>
        ${(m.status==='live'||m.status==='paused')?`<div class="score-large">${m.home_score} – ${m.away_score} <span style="font-size:14px;color:var(--muted);font-weight:400">${fmt(elapsed)}</span></div>`:''}
        <div style="display:flex;gap:6px;margin-top:8px" class="card-actions">
          <button class="btn btn-secondary btn-sm" data-share="${m.share_token}">📤 Delen</button>
          <button class="btn btn-danger btn-sm" data-del="${m.id}">🗑️</button>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
  const nb = document.getElementById('btn-new-match');
  if (nb) nb.onclick = () => { S.showModal='new-match'; render(); };
  el.querySelectorAll('.match-card').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('.card-actions')) return;
      S.currentMatchId = card.dataset.mid; S.page='match'; render();
    };
  });
  el.querySelectorAll('[data-share]').forEach(b => {
    b.onclick = e => { e.stopPropagation(); toast('Deellink gekopieerd! 📋'); };
  });
  el.querySelectorAll('[data-del]').forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      if (!confirm('Wedstrijd verwijderen?')) return;
      const id = b.dataset.del;
      S.matches = S.matches.filter(m => m.id!==id);
      S.events = S.events.filter(ev => ev.match_id!==id);
      render(); toast('Wedstrijd verwijderd');
    };
  });
}

// ── Match tracker ──────────────────────────────────────────────────────────
function renderMatch(app) {
  const m = S.matches.find(x => x.id===S.currentMatchId);
  if (!m) { S.page='dash'; render(); return; }
  const elapsed = getElapsed(m);
  const qdur = m.quarter_minutes * 60000;
  const prog = Math.min(100, elapsed/qdur*100);
  const homeLabel = m.home_away==='home' ? m.team_name : m.opponent;
  const awayLabel = m.home_away==='home' ? m.opponent : m.team_name;
  const evs = S.events.filter(e => e.match_id===m.id).sort((a,b) => b.clock_ms-a.clock_ms);
  const players = S.players.filter(p => p.team_id===m.team_id);

  const scoreAdjHome = m.status==='finished' ? `<div style="display:flex;gap:4px;justify-content:center;margin-top:4px">
    <button class="ctrl-btn" style="padding:3px 8px;font-size:11px" id="hs-dec">−</button>
    <button class="ctrl-btn" style="padding:3px 8px;font-size:11px" id="hs-inc">+</button></div>` : '';
  const scoreAdjAway = m.status==='finished' ? `<div style="display:flex;gap:4px;justify-content:center;margin-top:4px">
    <button class="ctrl-btn" style="padding:3px 8px;font-size:11px" id="as-dec">−</button>
    <button class="ctrl-btn" style="padding:3px 8px;font-size:11px" id="as-inc">+</button></div>` : '';

  let ctrlBtns = '';
  if (m.status==='scheduled') {
    ctrlBtns += `<button class="ctrl-btn primary" id="ctrl-start">▶ Start</button>
    <button class="ctrl-btn" id="ctrl-mark-played">✓ Markeer als gespeeld</button>`;
  }
  if (m.status==='live') {
    ctrlBtns += `<button class="ctrl-btn primary" id="ctrl-pause">⏸ Pauze</button>`;
    if (m.current_quarter < m.total_quarters)
      ctrlBtns += `<button class="ctrl-btn" id="ctrl-next-period">⏭ Volgende periode</button>`;
    else
      ctrlBtns += `<button class="ctrl-btn" id="ctrl-end">⏹ Einde</button>`;
    ctrlBtns += `<button class="ctrl-btn danger" id="ctrl-finish">🏁 Beëindig</button>`;
  }
  if (m.status==='paused') {
    ctrlBtns += `<button class="ctrl-btn primary" id="ctrl-resume">▶ Hervat</button>
    <button class="ctrl-btn danger" id="ctrl-finish">🏁 Beëindig</button>`;
  }
  if (m.status==='finished') {
    ctrlBtns += `<button class="ctrl-btn" id="ctrl-reopen">▶ Heropen</button>
    <button class="ctrl-btn" id="ctrl-share">📤 Deel wedstrijd</button>`;
  }

  const timeAdj = (m.status==='live'||m.status==='paused') ? `
    <div style="display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:6px">
      <span style="font-size:11px;color:var(--muted)">Tijd:</span>
      <button class="ctrl-btn" style="padding:4px 8px;font-size:11px" data-adj="-60000">−1m</button>
      <button class="ctrl-btn" style="padding:4px 8px;font-size:11px" data-adj="-10000">−10s</button>
      <button class="ctrl-btn" style="padding:4px 8px;font-size:11px" data-adj="10000">+10s</button>
      <button class="ctrl-btn" style="padding:4px 8px;font-size:11px" data-adj="60000">+1m</button>
    </div>` : '';

  const evBtns = (m.status==='live'||m.status==='paused') ? `
    <div class="card" style="padding:12px">
      <div class="section-title">Gebeurtenis toevoegen</div>
      <div class="ev-grid">
        ${[['⚽','Doelpunt','goal'],['🎯','Pen. +','pen_scored'],['❌','Pen. −','pen_missed'],
           ['🚩','Hoekschop','corner'],['🅵','Vrije trap','free_kick'],['🟨','Geel','yellow'],
           ['🟥','Rood','red'],['🔄','Wissel','sub'],['📝','Notitie','note']].map(([ico,lbl,kind])=>
          `<button class="ev-btn" data-kind="${kind}"><span class="ev-ico">${ico}</span>${lbl}</button>`
        ).join('')}
      </div>
    </div>` : '';

  let evHtml = evs.map(ev => {
    const team = ev.team_side==='home'?homeLabel:ev.team_side==='away'?awayLabel:null;
    let title = EV_LABEL[ev.type]||ev.type;
    if (ev.type==='substitution') title = `Wissel — ${ev.player_out||'?'} → ${ev.player_in||'?'}`;
    else if (ev.type==='note') title = ev.note||'Notitie';
    else { if(team) title+=` — ${team}`; if(ev.player_name) title+=` (${ev.player_name})`; }
    return `<div class="event-item">
      <div class="event-icon">${EV_ICON[ev.type]||'•'}</div>
      <div class="event-detail">
        <div class="event-title">${title}</div>
        <div class="event-sub">P${ev.quarter} · ${fmt(ev.clock_ms)}</div>
      </div>
      <button class="event-del" data-evid="${ev.id}">×</button>
    </div>`;
  }).join('');

  app.innerHTML = `
  <div class="app">
    <div class="header">
      <button class="btn-header" id="btn-back">← Terug</button>
      <div class="header-title">
        <h1>${m.home_away==='home'?`${m.team_name} vs ${m.opponent}`:`${m.opponent} vs ${m.team_name}`}</h1>
        <p>${fmtDate(m.match_date)}</p>
      </div>
    </div>
    <div class="content">
      <div class="score-board">
        <div class="score-teams">
          <div>
            <div class="score-label">${homeLabel}</div>
            <div class="score-num">${m.home_score}</div>
            ${scoreAdjHome}
          </div>
          <div>
            <div class="score-clock">${fmt(elapsed)}</div>
            <div class="score-period">P${m.current_quarter}/${m.total_quarters} · ${m.quarter_minutes}'</div>
          </div>
          <div>
            <div class="score-label">${awayLabel}</div>
            <div class="score-num">${m.away_score}</div>
            ${scoreAdjAway}
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <span class="badge badge-${m.status}">${{live:'🔴 Live',paused:'⏸️ Pauze',finished:'✅ Afgelopen',scheduled:'📅 Gepland'}[m.status]}</span>
        <span class="badge badge-scheduled">${{league:'Competitie',friendly:'Vriendschappelijk',cup:'Beker',tournament:'Toernooi'}[m.match_type]||m.match_type}</span>
      </div>
      <div class="card" style="padding:12px">
        <div class="ctrl-row">${ctrlBtns}</div>${timeAdj}
      </div>
      ${evBtns}
      <div class="card" style="padding:12px">
        <div class="section-title">Gebeurtenissen (${evs.length})</div>
        ${evHtml||'<p style="font-size:13px;color:var(--muted)">Nog geen gebeurtenissen.</p>'}
      </div>
    </div>
  </div>`;

  document.getElementById('btn-back').onclick = () => { S.page='dash'; render(); };
  const hsd = document.getElementById('hs-dec'); if(hsd) hsd.onclick=()=>{m.home_score=Math.max(0,m.home_score-1);render();};
  const hsi = document.getElementById('hs-inc'); if(hsi) hsi.onclick=()=>{m.home_score++;render();};
  const asd = document.getElementById('as-dec'); if(asd) asd.onclick=()=>{m.away_score=Math.max(0,m.away_score-1);render();};
  const asi = document.getElementById('as-inc'); if(asi) asi.onclick=()=>{m.away_score++;render();};

  const id = id => document.getElementById(id);
  const cs = id('ctrl-start'); if(cs) cs.onclick=()=>{m.status='live';m.timer_started_at=new Date().toISOString();m.timer_elapsed_ms=0;render();toast('Wedstrijd gestart! ▶');};
  const cm = id('ctrl-mark-played'); if(cm) cm.onclick=()=>{m.status='finished';render();toast('Gemarkeerd als gespeeld ✓');};
  const cp = id('ctrl-pause'); if(cp) cp.onclick=()=>{const n=Date.now();m.timer_elapsed_ms+=n-new Date(m.timer_started_at).getTime();m.timer_started_at=null;m.status='paused';render();toast('Pauze ⏸');};
  const cnp = id('ctrl-next-period'); if(cnp) cnp.onclick=()=>{const e=getElapsed(m);m.period_durations_ms[m.current_quarter-1]=e;m.current_quarter++;m.timer_elapsed_ms=0;m.timer_started_at=new Date().toISOString();render();toast(`Periode ${m.current_quarter} gestart`);};
  const ce = id('ctrl-end'); if(ce) ce.onclick=()=>{const e=getElapsed(m);m.period_durations_ms[m.current_quarter-1]=e;m.timer_elapsed_ms=e;m.timer_started_at=null;m.status='finished';render();toast('Wedstrijd afgelopen! 🏁');};
  const cf = id('ctrl-finish'); if(cf) cf.onclick=()=>{if(!confirm('Wedstrijd beëindigen?'))return;m.status='finished';m.timer_started_at=null;render();toast('Beëindigd');};
  const cr = id('ctrl-resume'); if(cr) cr.onclick=()=>{m.timer_started_at=new Date().toISOString();m.status='live';render();toast('Hervat ▶');};
  const cro = id('ctrl-reopen'); if(cro) cro.onclick=()=>{m.status='paused';m.timer_started_at=null;render();toast('Heropend');};
  const csh = id('ctrl-share'); if(csh) csh.onclick=()=>toast('Deellink gekopieerd! 📋');

  app.querySelectorAll('[data-adj]').forEach(b => {
    b.onclick = () => {
      const d = parseInt(b.dataset.adj);
      if(m.status==='live'&&m.timer_started_at){const n=Date.now();m.timer_elapsed_ms+=n-new Date(m.timer_started_at).getTime();m.timer_started_at=new Date().toISOString();}
      m.timer_elapsed_ms=Math.max(0,m.timer_elapsed_ms+d); render();
    };
  });

  app.querySelectorAll('[data-kind]').forEach(b => {
    b.onclick = () => {
      S.showAddEvent = b.dataset.kind;
      S.evSide = m.home_away;
      S.evPlayer=''; S.evNote=''; S.evClockMin=Math.round(getElapsed(m)/60000);
      S.evPlayerOutId=''; S.evPlayerInId='';
      renderAddEventModal(m, players, homeLabel, awayLabel);
    };
  });

  app.querySelectorAll('[data-evid]').forEach(b => {
    b.onclick = () => {
      S.events=S.events.filter(e=>e.id!==b.dataset.evid); render(); toast('Verwijderd');
    };
  });
}

// ── Add Event Modal ────────────────────────────────────────────────────────
function renderAddEventModal(m, players, homeLabel, awayLabel) {
  const kind = S.showAddEvent;
  const usSide = m.home_away;
  const titles = {goal:'⚽ Doelpunt',yellow:'🟨 Gele kaart',red:'🟥 Rode kaart',sub:'🔄 Wissel',note:'📝 Notitie',corner:'🚩 Hoekschop',free_kick:'🅵 Vrije trap',pen_scored:'🎯 Strafschop (gescoord)',pen_missed:'❌ Strafschop (gemist)'};
  const needsTeam = kind!=='note';
  const needsPlayer = ['goal','yellow','red','pen_scored','pen_missed'].includes(kind);
  const isOur = S.evSide===usSide;

  let playerDropdown = '';
  if (needsPlayer) {
    if (isOur && players.length) {
      playerDropdown = `<div class="form-group"><label>Speler</label>
        <select class="field" id="ev-player-sel">
          <option value="">— kies speler —</option>
          ${players.map(p=>{const l=p.shirt_number?`#${p.shirt_number} ${p.name}`:p.name;return`<option value="${l}"${S.evPlayer===l?' selected':''}>${l}</option>`;}).join('')}
        </select>
        <input class="field" id="ev-player-inp" placeholder="of vrij invullen" style="margin-top:6px" value="${S.evPlayer||''}">
      </div>`;
    } else {
      playerDropdown = `<div class="form-group"><label>Speler</label>
        <input class="field" id="ev-player-inp" placeholder="Naam of rugnummer" value="${S.evPlayer||''}">
      </div>`;
    }
  }

  let subFields = '';
  if (kind==='sub') {
    if (isOur && players.length) {
      subFields = `<div class="grid2">
        <div class="form-group"><label>Uit</label>
          <select class="field" id="ev-out">${players.map(p=>`<option value="${p.id}">${p.shirt_number?'#'+p.shirt_number+' ':''}${p.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>In</label>
          <select class="field" id="ev-in">${players.map(p=>`<option value="${p.id}">${p.shirt_number?'#'+p.shirt_number+' ':''}${p.name}</option>`).join('')}</select>
        </div>
      </div>`;
    } else {
      subFields = `<div class="grid2">
        <div class="form-group"><label>Uit</label><input class="field" id="ev-out-txt" placeholder="Speler"></div>
        <div class="form-group"><label>In</label><input class="field" id="ev-in-txt" placeholder="Speler"></div>
      </div>`;
    }
  }

  const div = document.createElement('div');
  div.className = 'overlay';
  div.id = 'ev-modal-overlay';
  div.innerHTML = `<div class="modal" id="ev-modal">
    <h3>${titles[kind]||kind}</h3>
    ${needsTeam?`<div class="form-group"><label>Team</label>
      <div class="grid2">
        <button class="ctrl-btn${S.evSide==='home'?' primary':''}" id="side-home">${homeLabel}</button>
        <button class="ctrl-btn${S.evSide==='away'?' primary':''}" id="side-away">${awayLabel}</button>
      </div></div>`:''}
    ${playerDropdown}
    ${subFields}
    ${kind==='note'?`<div class="form-group"><label>Notitie</label><textarea class="field" id="ev-note">${S.evNote||''}</textarea></div>`:''}
    <div class="form-group"><label>Tijd (minuten)</label>
      <input class="field" type="number" id="ev-clock" min="0" value="${S.evClockMin||0}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="ev-cancel">Annuleer</button>
      <button class="btn btn-primary" id="ev-save">+ Toevoegen</button>
    </div>
  </div>`;
  document.getElementById('app').appendChild(div);

  div.onclick = e => { if(e.target===div){div.remove();S.showAddEvent=null;} };
  document.getElementById('ev-modal').onclick = e => e.stopPropagation();
  document.getElementById('ev-cancel').onclick = () => { div.remove(); S.showAddEvent=null; };

  const sh = document.getElementById('side-home');
  const sa = document.getElementById('side-away');
  if(sh) sh.onclick=()=>{S.evSide='home';div.remove();renderAddEventModal(m,players,homeLabel,awayLabel);};
  if(sa) sa.onclick=()=>{S.evSide='away';div.remove();renderAddEventModal(m,players,homeLabel,awayLabel);};

  const ps = document.getElementById('ev-player-sel');
  const pi = document.getElementById('ev-player-inp');
  if(ps) ps.onchange = e => { S.evPlayer=e.target.value; if(pi)pi.value=e.target.value; };
  if(pi) pi.oninput = e => { S.evPlayer=e.target.value; };

  const nt = document.getElementById('ev-note');
  if(nt) nt.oninput = e => { S.evNote=e.target.value; };
  const cl = document.getElementById('ev-clock');
  if(cl) cl.oninput = e => { S.evClockMin=parseInt(e.target.value)||0; };

  document.getElementById('ev-save').onclick = () => {
    const type = KIND_TYPE[kind];
    const ev = {
      id:uid(), match_id:m.id, type,
      team_side: needsTeam ? S.evSide : null,
      quarter: m.current_quarter,
      clock_ms: (S.evClockMin||0)*60000,
      player_name: needsPlayer ? (S.evPlayer||null) : null,
      note: kind==='note' ? S.evNote : null,
      player_out: null, player_in: null,
    };
    if (kind==='sub') {
      const isOurSide = S.evSide===usSide;
      if (isOurSide && players.length) {
        const outSel = document.getElementById('ev-out');
        const inSel = document.getElementById('ev-in');
        const po = outSel ? players.find(p=>p.id===outSel.value) : null;
        const pi2 = inSel ? players.find(p=>p.id===inSel.value) : null;
        ev.player_out = po ? (po.shirt_number?`#${po.shirt_number} ${po.name}`:po.name) : null;
        ev.player_in = pi2 ? (pi2.shirt_number?`#${pi2.shirt_number} ${pi2.name}`:pi2.name) : null;
      } else {
        const ot = document.getElementById('ev-out-txt');
        const it = document.getElementById('ev-in-txt');
        ev.player_out = ot ? ot.value : null;
        ev.player_in = it ? it.value : null;
      }
    }
    S.events.push(ev);
    if (kind==='goal'||kind==='pen_scored') {
      if(S.evSide==='home') m.home_score++;
      else m.away_score++;
    }
    div.remove(); S.showAddEvent=null; render(); toast('Toegevoegd! ✓');
  };
}

// ── Teams ──────────────────────────────────────────────────────────────────
function renderTeams(el) {
  let html = `<h1 class="page-title">Teams</h1>`;
  S.teams.forEach(t => {
    html += `<div class="team-card">
      <div class="team-logo">${t.logo||'🛡️'}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:var(--navy)">${t.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${t.player_format}-tal · ${t.match_duration_minutes} min · ${t.period_count} periodes</div>
        ${t.is_fixed?'<span class="badge badge-scheduled" style="margin-top:4px;display:inline-flex">Hoofd team</span>':''}
      </div>
      ${!t.is_fixed?`<button class="btn btn-danger btn-sm" data-del-team="${t.id}">🗑️</button>`:''}
    </div>`;
  });
  if (S.teams.length < 5) {
    html += `<div class="card">
      <div class="section-title">Nieuw team toevoegen</div>
      <div class="form-group"><label>Teamnaam</label><input class="field" id="team-name" placeholder="FC Voorbeeld" value="${S.newTeamName||''}"></div>
      <div class="form-group"><label>Logo (emoji of URL)</label><input class="field" id="team-logo" placeholder="🛡️ of https://..." value="${S.newTeamLogo||''}"></div>
      <div class="form-group"><label>Formaat</label></div>
      <div class="row" style="margin-bottom:12px">
        <button class="ctrl-btn${S.newTeamFormat===8?' primary':''}" id="fmt-8">8-tal (60 min, 4 per.)</button>
        <button class="ctrl-btn${S.newTeamFormat===11?' primary':''}" id="fmt-11">11-tal (90 min, 2 helf.)</button>
      </div>
      <button class="btn btn-primary" id="btn-add-team">+ Team toevoegen</button>
    </div>`;
  }
  el.innerHTML = html;

  el.querySelectorAll('[data-del-team]').forEach(b => {
    b.onclick=()=>{const t=S.teams.find(x=>x.id===b.dataset.delTeam);if(!confirm(`"${t?.name}" verwijderen?`))return;S.teams=S.teams.filter(x=>x.id!==b.dataset.delTeam);render();toast('Team verwijderd');};
  });
  const tn=document.getElementById('team-name'); if(tn){tn.oninput=e=>{S.newTeamName=e.target.value;};}
  const tl=document.getElementById('team-logo'); if(tl){tl.oninput=e=>{S.newTeamLogo=e.target.value;};}
  const f8=document.getElementById('fmt-8'); if(f8){f8.onclick=()=>{S.newTeamFormat=8;render();};}
  const f11=document.getElementById('fmt-11'); if(f11){f11.onclick=()=>{S.newTeamFormat=11;render();};}
  const bat=document.getElementById('btn-add-team');
  if(bat) bat.onclick=()=>{
    if(!S.newTeamName){toast('Vul een naam in','error');return;}
    const pf=S.newTeamFormat||8;
    S.teams.push({id:uid(),name:S.newTeamName,logo:S.newTeamLogo||'🛡️',is_fixed:false,player_format:pf,match_duration_minutes:pf===11?90:60,period_count:pf===11?2:4});
    S.newTeamName='';S.newTeamLogo='';S.newTeamFormat=8;render();toast('Team toegevoegd! ✓');
  };
}

// ── Players ────────────────────────────────────────────────────────────────
function renderPlayers(el) {
  const pills = S.teams.map(t=>`<button class="tab-pill${S.teamTab===t.id?' active':''}" data-tid="${t.id}">${t.name}</button>`).join('');
  const players = S.players.filter(p=>p.team_id===S.teamTab);
  const posHtml = POSITIONS.map(code=>`<span class="tag${(S.newPlayerPositions||[]).includes(code)?' active':''}" data-pos="${code}">${code}</span>`).join('');

  let playersHtml = '';
  if(!players.length) {
    playersHtml='<div class="empty" style="padding:20px"><p>Nog geen spelers in dit team</p></div>';
  } else {
    playersHtml = players.map(p=>`<div class="player-row">
      <div class="player-num">${p.shirt_number||'?'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${p.name}</div>
        ${p.position?`<div style="margin-top:2px">${p.position.split(',').filter(Boolean).map(pos=>`<span class="pos-tag">${pos}</span>`).join('')}</div>`:''}
      </div>
      <button class="btn btn-danger btn-sm" data-del-player="${p.id}">🗑️</button>
    </div>`).join('');
  }

  el.innerHTML = `<h1 class="page-title">Spelers</h1>
    <div class="tab-pills">${pills}</div>
    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 70px auto;gap:8px;margin-bottom:8px">
        <input class="field" id="pl-name" placeholder="Naam speler" value="${S.newPlayerName||''}">
        <input class="field" type="number" min="1" max="99" id="pl-shirt" placeholder="#" value="${S.newPlayerShirt||''}">
        <button class="btn btn-primary" id="btn-add-player">+</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Posities (meerdere mogelijk)</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px" id="pos-tags">${posHtml}</div>
    </div>
    ${playersHtml}`;

  el.querySelectorAll('[data-tid]').forEach(b=>{ b.onclick=()=>{S.teamTab=b.dataset.tid;render();}; });
  el.querySelectorAll('[data-pos]').forEach(sp=>{ sp.onclick=()=>{
    const c=sp.dataset.pos;const pos=S.newPlayerPositions||[];
    S.newPlayerPositions=pos.includes(c)?pos.filter(p=>p!==c):[...pos,c];render();
  };});
  el.querySelectorAll('[data-del-player]').forEach(b=>{ b.onclick=()=>{if(!confirm('Speler verwijderen?'))return;S.players=S.players.filter(p=>p.id!==b.dataset.delPlayer);render();toast('Verwijderd');}; });
  const pn=document.getElementById('pl-name'); if(pn) pn.oninput=e=>{S.newPlayerName=e.target.value;};
  const ps=document.getElementById('pl-shirt'); if(ps) ps.oninput=e=>{S.newPlayerShirt=e.target.value;};
  const ap=document.getElementById('btn-add-player');
  if(ap) ap.onclick=()=>{
    if(!S.newPlayerName){toast('Vul een naam in','error');return;}
    S.players.push({id:uid(),team_id:S.teamTab,name:S.newPlayerName,shirt_number:S.newPlayerShirt?parseInt(S.newPlayerShirt):null,position:(S.newPlayerPositions||[]).join(',')});
    S.newPlayerName='';S.newPlayerShirt='';S.newPlayerPositions=[];render();toast('Speler toegevoegd! ✓');
  };
}

// ── Stats ──────────────────────────────────────────────────────────────────
function renderStats(el) {
  const teamPills = S.teams.map(t=>`<button class="tab-pill${S.statsTeamId===t.id?' active':''}" data-stid="${t.id}">${t.name}</button>`).join('');
  const filterPills = [['all','Alle'],['league','Competitie'],['friendly','Vriendschappelijk'],['cup','Beker'],['tournament','Toernooi']]
    .map(([k,l])=>`<button class="tab-pill${S.statsFilter===k?' active':''}" data-sf="${k}">${l}</button>`).join('');

  const allM = S.matches.filter(m=>m.team_id===S.statsTeamId&&m.status==='finished');
  const filtM = S.statsFilter==='all'?allM:S.statsFilter==='tournament'?allM.filter(m=>m.match_type==='tournament'||m.tournament_id):allM.filter(m=>m.match_type===S.statsFilter);
  const allEv = S.events.filter(e=>filtM.some(m=>m.id===e.match_id));

  const wins=filtM.filter(m=>{const wh=m.home_away==='home';return wh?m.home_score>m.away_score:m.away_score>m.home_score;}).length;
  const draws=filtM.filter(m=>m.home_score===m.away_score).length;
  const losses=filtM.length-wins-draws;
  const gs=allEv.filter(e=>['goal','penalty_scored'].includes(e.type)&&e.team_side===filtM.find(m=>m.id===e.match_id)?.home_away).length;
  const gc=allEv.filter(e=>['goal','penalty_scored'].includes(e.type)&&e.team_side!==filtM.find(m=>m.id===e.match_id)?.home_away).length;

  const scorerMap={};
  allEv.filter(e=>['goal','penalty_scored'].includes(e.type)&&e.player_name).forEach(e=>{
    const m=filtM.find(x=>x.id===e.match_id);
    if(m&&e.team_side===m.home_away) scorerMap[e.player_name]=(scorerMap[e.player_name]||0)+1;
  });
  const scorers=Object.entries(scorerMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const matchRows = [...filtM].sort((a,b)=>new Date(b.match_date)-new Date(a.match_date)).map(m=>{
    const wh=m.home_away==='home';const ws=wh?m.home_score:m.away_score;const os=wh?m.away_score:m.home_score;
    const res=ws>os?'W':ws===os?'G':'V';
    const rc={W:'var(--green)',G:'var(--gold)',V:'var(--red)'}[res];
    return `<div class="stat-row" style="cursor:pointer" data-match="${m.id}">
      <span class="stat-label">${fmtDateOnly(m.match_date)} — vs ${m.opponent}</span>
      <span class="stat-val" style="color:${rc}">${res}</span>
      <span class="stat-val">${ws}–${os}</span>
    </div>`;
  }).join('');

  el.innerHTML = `<h1 class="page-title">Statistieken</h1>
    <div class="tab-pills">${teamPills}</div>
    <div class="tab-pills">${filterPills}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      ${[['${wins}W ${draws}G ${losses}V','Resultaten'],['${gs}–${gc}','Doelpunten'],['${filtM.length}','Gespeeld']].map(([v,l])=>`<div class="card" style="text-align:center;background:var(--bg);padding:12px"><div style="font-size:20px;font-weight:700;color:var(--navy)">${v.replace(/\${/g,'').replace(/}/g,'')}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${l}</div></div>`).join('')}
    </div>
    ${scorers.length?`<div class="card"><div class="section-title">Topscorers</div>${scorers.map(([n,g],i)=>`<div class="stat-row"><span class="stat-label">${i+1}. ${n}</span><span class="stat-val">${g} ${g===1?'doelpunt':'doelpunten'}</span></div>`).join('')}</div>`:''}
    ${filtM.length?`<div class="card"><div class="section-title">Gespeelde wedstrijden</div>${matchRows}</div>`:`<div class="empty"><div class="empty-icon">📊</div><p>Nog geen afgelopen wedstrijden</p></div>`}`;

  // Fix the stat numbers (template strings didn't expand cleanly above, use direct DOM)
  const nums = el.querySelectorAll('.card > div:first-child');
  el.querySelectorAll('[data-stid]').forEach(b=>b.onclick=()=>{S.statsTeamId=b.dataset.stid;render();});
  el.querySelectorAll('[data-sf]').forEach(b=>b.onclick=()=>{S.statsFilter=b.dataset.sf;render();});
  el.querySelectorAll('[data-match]').forEach(b=>b.onclick=()=>{S.currentMatchId=b.dataset.match;S.page='match';render();});

  // patch numbers properly
  const statCards = el.querySelectorAll('[style*="background:var(--bg)"]');
  if(statCards[0]) statCards[0].querySelector('div').textContent = `${wins}W ${draws}G ${losses}V`;
  if(statCards[1]) statCards[1].querySelector('div').textContent = `${gs}–${gc}`;
  if(statCards[2]) statCards[2].querySelector('div').textContent = String(filtM.length);
}

// ── Tournaments ────────────────────────────────────────────────────────────
function renderTournaments(el) {
  let tHtml='';
  S.tournaments.forEach(t=>{
    const ms=S.matches.filter(m=>m.tournament_id===t.id);
    const meta=[t.start_date?fmtDateOnly(t.start_date):'',t.location||'',t.format==='group'?'Groepsfase':'Knock-out'].filter(Boolean).join(' · ');
    const msHtml=ms.length?ms.map(m=>{
      const wh=m.home_away==='home';const hs=wh?m.home_score:m.away_score;const as2=wh?m.away_score:m.home_score;
      return `<div class="stat-row" style="cursor:pointer" data-match="${m.id}">
        <span class="badge badge-${m.status}" style="flex-shrink:0">${m.status==='finished'?'✓':m.status==='live'?'Live':'Gepland'}</span>
        <span style="flex:1;font-size:13px">${m.team_name} vs ${m.opponent}</span>
        ${m.status==='finished'?`<span style="font-weight:700;font-size:13px;color:var(--navy)">${hs}–${as2}</span>`:''}
      </div>`;
    }).join(''):'<p style="font-size:13px;color:var(--muted)">Geen wedstrijden gekoppeld.</p>';
    tHtml+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-weight:700;font-size:15px;color:var(--navy)">🏆 ${t.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${meta}</div>
        </div>
        <button class="btn btn-danger btn-sm" data-del-tn="${t.id}">🗑️</button>
      </div>
      <div class="section-title">Wedstrijden (${ms.length})</div>
      ${msHtml}
      <button class="btn btn-secondary btn-sm" style="margin-top:8px" data-add-match-tn="${t.id}">+ Wedstrijd toevoegen</button>
    </div>`;
  });

  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h1 class="page-title" style="margin:0">Toernooien</h1>
  </div>
  <div class="card">
    <div class="section-title">Toernooi toevoegen</div>
    <div class="form-group"><label>Naam</label><input class="field" id="tn-name" placeholder="Zomerkampioenschap 2026" value="${S.newTournamentName||''}"></div>
    <div class="grid2">
      <div class="form-group"><label>Datum</label><input class="field" type="date" id="tn-date" value="${S.newTournamentDate||''}"></div>
      <div class="form-group"><label>Locatie</label><input class="field" id="tn-loc" placeholder="Stadion" value="${S.newTournamentLocation||''}"></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="ctrl-btn${(S.newTournamentFormat||'group')==='group'?' primary':''}" id="tn-fmt-group">Groepsfase</button>
      <button class="ctrl-btn${(S.newTournamentFormat||'group')==='knockout'?' primary':''}" id="tn-fmt-ko">Knock-out</button>
    </div>
    <button class="btn btn-primary" id="btn-add-tn">+ Toernooi aanmaken</button>
  </div>
  ${tHtml||'<div class="empty"><div class="empty-icon">🏆</div><h3>Geen toernooien</h3><p>Maak je eerste toernooi aan.</p></div>'}`;

  document.getElementById('tn-name').oninput=e=>{S.newTournamentName=e.target.value;};
  document.getElementById('tn-date').oninput=e=>{S.newTournamentDate=e.target.value;};
  document.getElementById('tn-loc').oninput=e=>{S.newTournamentLocation=e.target.value;};
  document.getElementById('tn-fmt-group').onclick=()=>{S.newTournamentFormat='group';render();};
  document.getElementById('tn-fmt-ko').onclick=()=>{S.newTournamentFormat='knockout';render();};
  document.getElementById('btn-add-tn').onclick=()=>{
    if(!S.newTournamentName){toast('Vul een naam in','error');return;}
    S.tournaments.push({id:uid(),name:S.newTournamentName,start_date:S.newTournamentDate||null,format:S.newTournamentFormat||'group',location:S.newTournamentLocation||null});
    S.newTournamentName='';S.newTournamentDate='';S.newTournamentLocation='';render();toast('Toernooi aangemaakt! 🏆');
  };
  el.querySelectorAll('[data-del-tn]').forEach(b=>b.onclick=()=>{if(!confirm('Toernooi verwijderen?'))return;S.tournaments=S.tournaments.filter(t=>t.id!==b.dataset.delTn);render();toast('Verwijderd');});
  el.querySelectorAll('[data-match]').forEach(b=>b.onclick=()=>{S.currentMatchId=b.dataset.match;S.page='match';render();});
  el.querySelectorAll('[data-add-match-tn]').forEach(b=>b.onclick=()=>{S.showModal='new-match';S.newMatchTournamentId=b.dataset.addMatchTn;render();});
}

// ── New Match Modal ────────────────────────────────────────────────────────
function renderNewMatchModal() {
  const existing = document.getElementById('nm-overlay');
  if(existing) return;
  const div=document.createElement('div');
  div.className='overlay';div.id='nm-overlay';
  const teamOpts=S.teams.map(t=>`<option value="${t.id}"${S.newMatchTeamId===t.id?' selected':''}>${t.name}</option>`).join('');
  const tnOpts=S.tournaments.length?`<div class="form-group"><label>Toernooi (optioneel)</label>
    <select class="field" id="nm-tn"><option value="">— geen —</option>${S.tournaments.map(t=>`<option value="${t.id}"${S.newMatchTournamentId===t.id?' selected':''}>${t.name}</option>`).join('')}</select></div>`:'';
  div.innerHTML=`<div class="modal">
    <h3>Nieuwe wedstrijd</h3>
    <div class="form-group"><label>Tegenstander</label><input class="field" id="nm-opp" placeholder="FC Tegenstander" value="${S.newMatchOpponent||''}"></div>
    <div class="form-group"><label>Datum &amp; tijd</label><input class="field" type="datetime-local" id="nm-date" value="${S.newMatchDate||''}"></div>
    <div class="form-group"><label>Team</label><select class="field" id="nm-team">${teamOpts}</select></div>
    <div class="form-group"><label>Thuis / Uit</label></div>
    <div class="row" style="margin-bottom:12px">
      <button class="ctrl-btn${S.newMatchHomeAway==='home'?' primary':''}" id="nm-home">🏠 Thuis</button>
      <button class="ctrl-btn${S.newMatchHomeAway==='away'?' primary':''}" id="nm-away">✈️ Uit</button>
    </div>
    <div class="form-group"><label>Type wedstrijd</label></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      ${[['league','Competitie'],['friendly','Vriendschappelijk'],['cup','Beker'],['tournament','Toernooi']].map(([v,l])=>`<button class="ctrl-btn${(S.newMatchType||'league')===v?' primary':''}" data-mtype="${v}">${l}</button>`).join('')}
    </div>
    ${tnOpts}
    <div class="modal-actions">
      <button class="btn btn-secondary" id="nm-cancel">Annuleer</button>
      <button class="btn btn-primary" id="nm-save">+ Aanmaken</button>
    </div>
  </div>`;
  document.getElementById('app').appendChild(div);
  div.onclick=e=>{if(e.target===div){div.remove();S.showModal=null;}};
  document.getElementById('nm-opp').oninput=e=>{S.newMatchOpponent=e.target.value;};
  document.getElementById('nm-date').oninput=e=>{S.newMatchDate=e.target.value;};
  document.getElementById('nm-team').onchange=e=>{S.newMatchTeamId=e.target.value;};
  const nmt=document.getElementById('nm-tn');if(nmt)nmt.onchange=e=>{S.newMatchTournamentId=e.target.value;};
  document.getElementById('nm-home').onclick=()=>{S.newMatchHomeAway='home';div.remove();S.showModal='new-match';renderNewMatchModal();};
  document.getElementById('nm-away').onclick=()=>{S.newMatchHomeAway='away';div.remove();S.showModal='new-match';renderNewMatchModal();};
  div.querySelectorAll('[data-mtype]').forEach(b=>b.onclick=()=>{S.newMatchType=b.dataset.mtype;div.remove();S.showModal='new-match';renderNewMatchModal();});
  document.getElementById('nm-cancel').onclick=()=>{div.remove();S.showModal=null;};
  document.getElementById('nm-save').onclick=()=>{
    if(!S.newMatchOpponent){toast('Vul een tegenstander in','error');return;}
    const tid=S.newMatchTeamId||S.teams[0]?.id;
    const team=S.teams.find(t=>t.id===tid)||S.teams[0];
    const qm=Math.round((team?.match_duration_minutes||90)/(team?.period_count||2));
    S.matches.push({
      id:uid(),team_id:tid,team_name:team?.name||'Mijn Team',
      opponent:S.newMatchOpponent,home_away:S.newMatchHomeAway||'home',
      status:'scheduled',home_score:0,away_score:0,
      match_date:S.newMatchDate||new Date().toISOString(),
      match_type:S.newMatchType||'league',
      timer_elapsed_ms:0,timer_started_at:null,share_token:uid(),
      quarter_minutes:qm,total_quarters:team?.period_count||2,
      current_quarter:1,is_break:false,period_durations_ms:[],
      tournament_id:S.newMatchTournamentId||null,show_lineup_public:true,player_format:team?.player_format||11,
    });
    div.remove();S.showModal=null;
    S.newMatchOpponent='';S.newMatchDate='';S.newMatchTournamentId='';
    render();toast('Wedstrijd aangemaakt! ✓');
  };
}

// ── Timer ──────────────────────────────────────────────────────────────────
setInterval(()=>{
  S.timerNow=Date.now();
  if(S.matches.some(m=>m.status==='live')&&(S.page==='match'||S.page==='dash')){
    if(S.page==='match'){
      const m=S.matches.find(x=>x.id===S.currentMatchId);
      if(m&&m.status==='live'){
        const el=document.querySelector('.score-clock');
        const elapsed=getElapsed(m);
        if(el)el.textContent=fmt(elapsed);
        const pb=document.querySelector('.progress-fill');
        if(pb)pb.style.width=Math.min(100,elapsed/(m.quarter_minutes*60000)*100)+'%';
      }
    }
  }
},500);

render();
</script>
</body>
</html>
